<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/styleIndex.css">
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
</head>
<body>
    <!--Menu de navegacion o dashboard-->
    <nav class="menu">
        <a href="index.html">Inicio</a>
        <a href="html/nosotros.html">Nosotros</a>
        <a href="html/Libros.html">Libros</a>
        <a href="html/blog.html">Blog</a>
        <div id="perfilUsuario" class="perfilUsuario">
            <span id="nombreUsuario"></span>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>
    <!-- Seccion para buscar productos-->
    <section class="buscador">
        <input type="text" id="buscarLibro" placeholder="Buscar libro o autor">
        <button onclick="buscarLibro()">Buscar</button>
        <h1>Bienvenido TuLibreria</h1>
        <div id="resultadoBusqueda"></div>
        <p>Registrate y busca tus historias favoritas</p>
    </section>
    <!--Formulario de ingreso de usuario-->
    <section class="formularioUsuario">
        <!--Titulo de la seccion-->
        <h3> Registrarse</h3>
        <!--Formulario de registro-->
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="email" id="email" placeholder="Correo Electrónico">
        <select id="tipoUsuario">
            <option value="cliente">Cliente</option>
            <option value="admin">Administrador</option>
        </select>
        <input type="password" id="contrasenia" placeholder="Contraseña">
        <input type="password" id="confirmarContrasenia" placeholder="Confirmar Contraseña">
        <!--Boton de registro que llama al script que ejecuta la logica de registrar usuario-->
        <button onclick="registrarUsuario()">Registrarse</button>
        <!--Acá iría el boton de inicio de sesión, falta hacer la logica (Confirmar que el nombre/email y la contraseña ya se encuentran en la lista de usuarios)-->
        <h3> Iniciar sesión</h3>
        <input type="text" id="emailLogin" placeholder="Correo Electrónico">
        <input type="password" id="contraseniaLogin" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Iniciar Sesión</button>
    </section>
</body>
<script
src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
crossorigin="anonymous">
</script>
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"

crossorigin="anonymous">
</script>
<!--Llamado al script que contiene la logica relacionada al usuario-->
<script src="assets/js/usuario.js"></script>
</html>
