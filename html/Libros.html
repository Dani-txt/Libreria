            <span id="nombreUsuario"></span>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>

    <!-- Seccion para buscar productos-->
    <section class="buscador">
    <h1>Buscar Libro</h1>
    <input type="text" id="buscarLibro" placeholder="Escribe título o autor">
    <button onclick="buscarLibro()">Buscar</button>
    <div id="resultadoBusqueda"></div>
    </section>

<!--Formulario para agregar libros (Falta script para diferenciar usuario cliente y usuario admin)-->
    <section class="agregarLibroSection" id="agregarLibroSection">
        <h2>Agregar Libro</h2>
        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="autor" placeholder="Autor">
        <input type="number" id="precio" placeholder="Precio">
        <input type="text" id="imagen" placeholder="URL Imagen">
        <textarea id="descripcion" placeholder="Descripción"></textarea>
        <button onclick="agregarLibro()">Agregar Libro</button>
    </section>

    <section class="carritoSection">
        <h2>Carrito de Compras</h2>
        <button onclick="mostrarCarrito()">Ver Carrito</button>
        <div id="carrito"></div>
        <button id="botonComprar" clas="botonComprar" onclick="comprarCarrito()">Comprar</button>
    </section>

    <section class="catalogo">
        <h3>Catálogo de Libros</h3>
        <button onclick="mostrarCatalogo()">Mostrar Catálogo</button>
        <div id="catalogo"></div>
    </section>

    <footer>
        <p>------------------------- TuLibreria incorporated -------------------------</p>
    </footer>
